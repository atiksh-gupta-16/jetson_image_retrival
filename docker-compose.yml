version: "3.9"

services:
  api:
    build: .
    container_name: imagify-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data        # persists images + chroma index
      - ./.env:/app/.env
    environment:
      - EMBEDDING_DEVICE=cpu
    restart: unless-stopped

  frontend:
    image: python:3.11-slim
    container_name: imagify-frontend
    working_dir: /app
    command: >
      bash -c "pip install streamlit requests --quiet &&
               streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0"
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "8501:8501"
    environment:
      - IMAGIFY_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
